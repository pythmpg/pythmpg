name: Publish to PyPI (Trusted Publishing)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # stable vX.Y.Z only
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write              # scoped to this job
    environment:
      name: pypi-prod
      url: https://pypi.org/project/pythmpg/
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@v1.14.0